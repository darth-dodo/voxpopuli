              - paragraph [ref=e169]: "=== STORIES === [47659109] \"Age Verification as Mass Surveillance Infrastructure\" by rurban (134 points) URL: https://tboteproject.com/surveillancefindings/ [47658146] \"France pulls last gold held in US for $15B gain\" by teleforce (194 points) URL: https://www.mining.com/france-pulls-last-gold-held-in-us-for-15b-gain/ [47656659] \"Media scraper Gallery-dl is moving to Codeberg after receiving a DMCA notice\" by MoltenMonster (164 points) URL: https://github.com/mikf/gallery-dl/discussions/9304 [47656622] \"An open-source 240-antenna array to bounce signals off the Moon\" by hillcrestenigma (132 points) URL: https://moonrf.com/ [47656501] \"The 1987 game “The Last Ninja” was 40 kilobytes\" by keepamovin (144 points) URL: https://twitter.com/exQUIZitely/status/2040777977521398151 [47655466] \"Employers use your personal data to figure out the lowest salary you'll accept\" by thisislife2 (257 points) URL: https://www.marketwatch.com/story/employers-are-using-your-personal-data-to-figure-out-the-lowest-salary-youll-accept-c2b968fb [47655408] \"Show HN: I built a tiny LLM to demystify how language models work\" by armanified (555 points) URL: https://github.com/arman-bd/guppylm Text: Built a ~9M param LLM from scratch to understand how they actually work. Vanilla transformer, 60K synthetic conversations, ~130 lines of PyTorch. Trains in 5 min on a free Colab T4. The fish thinks the meaning of life is food. Fork it and swap the personality for your own character. [47655392] \"Show HN: I made a YouTube search form with advanced filters\" by nevernothing (251 points) URL: https://playlists.at/youtube/search/ [47655329] \"Copilot is 'for entertainment purposes only', per Microsoft's terms of use\" by airstrike (154 points) URL: https://techcrunch.com/2026/04/05/copilot-is-for-entertainment-purposes-only-according-to-microsofts-terms-of-service/ [47655058] \"OpenAI's fall from grace as investors race to Anthropic\" by 1vuio0pswjnm7 (