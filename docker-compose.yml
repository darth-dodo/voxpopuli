services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    command: npx nx serve api --hostname 0.0.0.0
    profiles:
      - dev
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    ports:
      - '4200:4200'
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    command: npx nx serve web --hostname 0.0.0.0 --proxy-config apps/web/proxy.conf.docker.json
    depends_on:
      - api-dev
    profiles:
      - dev
