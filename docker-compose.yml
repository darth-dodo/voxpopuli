services:
  api-dev:
    build:
      context: .
      target: dev
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    env_file: .env
    environment:
      NODE_ENV: development
    command: npx nx serve api --hostname 0.0.0.0

  web-dev:
    build:
      context: .
      target: dev
    ports:
      - '4200:4200'
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    env_file: .env
    environment:
      NODE_ENV: development
    command: npx nx serve web --host 0.0.0.0 --proxy-config apps/web/proxy.conf.docker.json
    depends_on:
      - api-dev

volumes:
  node_modules:
