previewsEnabled: true
previewsExpireAfterDays: 3

services:
  # NestJS API — Docker container (persistent process for SSE + cache)
  - type: web
    name: voxpopuli-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/health
    previews:
      generation: automatic
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        previewValue: onrender.com
      - fromGroup: voxpopuli-secrets

  # Angular frontend — static site via Render CDN
  - type: web
    name: voxpopuli-web
    runtime: static
    buildCommand: bash scripts/set-api-url.sh && corepack enable && pnpm install --frozen-lockfile && npx nx build web --configuration=production
    staticPublishPath: dist/apps/web/browser
    previews:
      generation: automatic
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_URL
        fromService:
          name: voxpopuli-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL

envVarGroups:
  - name: voxpopuli-secrets
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        value: nPczCjzI2devNBz1zQrb
      - key: ELEVENLABS_MODEL
        value: eleven_multilingual_v2
      - key: SENTRY_DSN
        sync: false
      - key: FRONTEND_URL
        value: https://voxpopuli-web-1o3v.onrender.com
