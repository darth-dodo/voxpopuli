<!-- Trust indicator chips -->
<div class="flex flex-wrap gap-3" role="group" aria-label="Trust indicators">
  <!-- Sources verified -->
  <div class="vp-trust-indicator">
    <svg
      class="w-4 h-4"
      [class]="verifiedColor()"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="2"
      aria-hidden="true"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
      />
    </svg>
    <span [class]="verifiedColor()">{{ verifiedLabel() }}</span>
  </div>

  <!-- Recency -->
  <div class="vp-trust-indicator">
    <svg
      class="w-4 h-4"
      [class]="recencyColor()"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="2"
      aria-hidden="true"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
      />
    </svg>
    <span [class]="recencyColor()">{{ recencyLabel() }}</span>
  </div>

  <!-- Viewpoint diversity -->
  <div class="vp-trust-indicator">
    <svg
      class="w-4 h-4"
      [class]="diversityColor()"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="2"
      aria-hidden="true"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"
      />
    </svg>
    <span [class]="diversityColor()">{{ trust().viewpointDiversity }}</span>
  </div>

  <!-- Show HN (conditional) -->
  @if (trust().showHnCount > 0) {
  <div class="vp-trust-indicator">
    <svg
      class="w-4 h-4 text-trust-caution"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="2"
      aria-hidden="true"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
      />
    </svg>
    <span class="text-trust-caution">{{ showHnLabel() }}</span>
  </div>
  }
</div>

<!-- Honesty flags -->
@if (trust().honestyFlags.length > 0) {
<div class="mt-2 flex flex-wrap gap-2">
  @for (flag of trust().honestyFlags; track flag) {
  <span class="text-mono text-xs text-text-muted">{{ flag }}</span>
  }
</div>
}
