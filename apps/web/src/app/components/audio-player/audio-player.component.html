<!-- ═══════════════════════════════════════════════
     Audio Narration — "The Broadcast Strip"
     Lives in the sticky header. All states inline.
     ═══════════════════════════════════════════════ -->

<!-- ─── Idle: Listen pill ─── -->
@if (state() === 'idle') {
<button
  type="button"
  class="group inline-flex items-center gap-2 px-2.5 py-1.5 rounded-lg border border-border-subtle hover:border-accent-amber/40 transition-all cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed"
  [disabled]="disabled()"
  (click)="onListen()"
  aria-label="Listen to narration"
>
  <div class="vp-waveform vp-waveform--idle" aria-hidden="true">
    <div class="vp-waveform-bar group-hover:!bg-accent-amber group-hover:!opacity-60"></div>
    <div class="vp-waveform-bar group-hover:!bg-accent-amber group-hover:!opacity-60"></div>
    <div class="vp-waveform-bar group-hover:!bg-accent-amber group-hover:!opacity-60"></div>
    <div class="vp-waveform-bar group-hover:!bg-accent-amber group-hover:!opacity-60"></div>
    <div class="vp-waveform-bar group-hover:!bg-accent-amber group-hover:!opacity-60"></div>
  </div>
  <span class="text-mono text-xs text-text-muted group-hover:text-accent-amber transition-colors whitespace-nowrap">
    Listen
  </span>
  <span class="text-mono text-[10px] text-text-faint group-hover:text-accent-amber/50 transition-colors hidden sm:inline">
    ~{{ estimatedMinutes() }}m
  </span>
</button>
}

<!-- ─── Loading: Waveform oscillates ─── -->
@if (state() === 'loading') {
<div
  class="inline-flex items-center gap-2 px-2.5 py-1.5 rounded-lg border border-accent-amber/20 bg-accent-amber/5"
>
  <div class="vp-waveform vp-waveform--loading" aria-hidden="true">
    <div class="vp-waveform-bar"></div>
    <div class="vp-waveform-bar"></div>
    <div class="vp-waveform-bar"></div>
    <div class="vp-waveform-bar"></div>
    <div class="vp-waveform-bar"></div>
  </div>
  <span class="text-mono text-xs text-accent-amber whitespace-nowrap hidden sm:inline">
    {{ loadingPhase() }}
  </span>
  <span class="text-mono text-[10px] tabular-nums text-accent-amber/50">
    {{ loadingElapsed() }}s
  </span>
  <button
    type="button"
    class="p-0.5 text-text-faint hover:text-accent-amber transition-colors cursor-pointer"
    (click)="cancelLoading()"
    aria-label="Cancel"
  >
    <svg class="w-2.5 h-2.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 6 6 18M6 6l12 12" />
    </svg>
  </button>
</div>
}

<!-- ─── Error: Red bars + retry ─── -->
@if (state() === 'error') {
<div class="inline-flex items-center gap-2 px-2.5 py-1.5">
  <div class="vp-waveform vp-waveform--idle" aria-hidden="true">
    <div class="vp-waveform-bar !bg-trust-danger"></div>
    <div class="vp-waveform-bar !bg-trust-danger"></div>
    <div class="vp-waveform-bar !bg-trust-danger"></div>
    <div class="vp-waveform-bar !bg-trust-danger"></div>
    <div class="vp-waveform-bar !bg-trust-danger"></div>
  </div>
  <span class="text-mono text-[10px] text-trust-danger hidden sm:inline">Failed</span>
  <button
    type="button"
    class="text-mono text-[10px] text-text-muted hover:text-accent-amber transition-colors cursor-pointer"
    (click)="onRetry()"
  >
    Retry
  </button>
</div>
}

<!-- ─── Active: Play/Pause/Complete — compact inline strip ─── -->
@if (state() === 'playing' || state() === 'paused' || state() === 'complete') {
<div
  class="inline-flex items-center gap-2 px-2.5 py-1.5 rounded-lg border transition-colors"
  [class]="state() === 'playing'
    ? 'border-accent-amber/30 bg-accent-amber/5'
    : 'border-border-subtle'"
>
  <!-- Play/Pause -->
  <button
    type="button"
    class="flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center cursor-pointer transition-all"
    [class]="state() === 'playing'
        ? 'bg-accent-amber text-surface-base'
        : state() === 'complete'
          ? 'border border-text-faint text-text-faint hover:border-accent-amber hover:text-accent-amber'
          : 'border border-accent-amber text-accent-amber hover:bg-accent-amber/10'"
    (click)="togglePlayPause()"
    [attr.aria-label]="state() === 'playing' ? 'Pause' : state() === 'complete' ? 'Replay' : 'Play'"
  >
    @if (state() === 'playing') {
    <svg class="w-2.5 h-2.5" viewBox="0 0 24 24" fill="currentColor">
      <rect x="6" y="4" width="4" height="16" rx="1" />
      <rect x="14" y="4" width="4" height="16" rx="1" />
    </svg>
    } @else if (state() === 'complete') {
    <svg class="w-2.5 h-2.5" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" />
      <path d="M21 3v5h-5" />
    </svg>
    } @else {
    <svg class="w-2.5 h-2.5 ml-px" viewBox="0 0 24 24" fill="currentColor">
      <polygon points="6,3 20,12 6,21" />
    </svg>
    }
  </button>

  <!-- Waveform -->
  <div class="vp-waveform" [class]="waveformClass()" aria-hidden="true">
    <div class="vp-waveform-bar"></div>
    <div class="vp-waveform-bar"></div>
    <div class="vp-waveform-bar"></div>
    <div class="vp-waveform-bar"></div>
    <div class="vp-waveform-bar"></div>
  </div>

  <!-- Seekable progress — thin bar -->
  <div
    #progressBar
    class="vp-seek-track w-16 sm:w-24 h-1 rounded-full bg-surface-overlay"
    (click)="seekTo($event)"
    role="slider"
    [attr.aria-valuenow]="currentTime()"
    [attr.aria-valuemax]="duration()"
    aria-label="Seek"
  >
    <div
      class="h-full rounded-full relative"
      [class]="state() === 'complete' ? 'bg-accent-amber/30' : 'bg-accent-amber'"
      [style.width.%]="progress()"
    >
      <div class="vp-seek-thumb"></div>
    </div>
  </div>

  <!-- Time -->
  <span class="text-mono text-[10px] tabular-nums text-text-muted whitespace-nowrap hidden sm:inline">
    {{ formattedTime() }}
  </span>

  <!-- Speed -->
  <button
    type="button"
    class="text-mono text-[10px] tabular-nums px-1 py-0.5 rounded bg-surface-overlay text-text-muted hover:text-accent-amber cursor-pointer transition-colors"
    (click)="cycleSpeed()"
    aria-label="Speed"
  >
    {{ playbackSpeed() }}x
  </button>

</div>
}
