<!-- Entire card links to HN discussion -->
<a
  class="vp-source-card block no-underline"
  [href]="hnUrl()"
  target="_blank"
  rel="noopener noreferrer"
  [attr.aria-label]="'View HN discussion: ' + source().title"
>
  <!-- Title row -->
  <p class="vp-source-card__title">
    <!-- Title links to original URL if available, stop propagation so outer card link still works -->
    @if (source().url) {
    <a
      class="text-text-primary hover:text-accent-amber-glow transition-colors no-underline"
      [href]="source().url"
      target="_blank"
      rel="noopener noreferrer"
      (click)="$event.stopPropagation()"
      [attr.aria-label]="'Read original article: ' + source().title"
    >
      {{ source().title }}
    </a>
    } @else {
    {{ source().title }}
    }
  </p>

  <!-- Metadata: 2-row stack on mobile, single-row on sm+ -->
  <div class="vp-source-card__meta sm:flex sm:flex-wrap sm:items-center sm:gap-x-3 sm:gap-y-1">
    <!-- Mobile: top row (author + date) -->
    <div class="flex items-center justify-between gap-x-3 sm:contents">
      <span class="truncate max-w-[10rem]">{{ source().author }}</span>
      @if (source().postedDate) {
      <span class="text-text-faint shrink-0" aria-label="posted date">{{ source().postedDate }}</span>
      }
    </div>
    <!-- Mobile: bottom row (points + comments) -->
    <div class="flex items-center gap-x-3 mt-1 sm:mt-0 sm:contents">
      <span class="shrink-0" aria-label="points">{{ source().points }} pts</span>
      <span class="shrink-0" aria-label="comments">{{ source().commentCount }} comments</span>
    </div>
  </div>
</a>
